<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Hospital Manager Assistant</title>

    <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <link rel="stylesheet"
        href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">

    <link rel="stylesheet"
        type="text/css"
        href="{{ url_for('static', path='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
</head>

<body>

    <div class="container-fluid h-100">
        <div class="row justify-content-center h-100">

            <div class="col-md-10 col-xl-8 chat">

                <div class="card">

                    <!-- HEADER -->
                    <div class="card-header msg_head">

                        <div class="header-center">

                            <div class="bot-logo">
                                <i class="fas fa-robot"></i>
                            </div>

                            <h1>Assistant Hospital Manager</h1>

                            <p>
                                Posez vos questions sur la documentation
                                de votre ERP hospitalier.
                            </p>

                        </div>

                    </div>

                    <!-- CHAT BODY -->
                    <div id="messageFormeight" class="card-body msg_card_body">

                        <!-- Suggestions -->
                        <div class="suggestions">

                            <div class="suggestion-card">
                                <i class="fas fa-user-injured"></i>
                                <span>Créer un patient</span>
                            </div>

                            <div class="suggestion-card">
                                <i class="fas fa-file-invoice-dollar"></i>
                                <span>Configurer la facturation</span>
                            </div>

                            <div class="suggestion-card">
                                <i class="fas fa-chart-bar"></i>
                                <span>Générer un rapport</span>
                            </div>

                        </div>

                    </div>

                    <!-- FOOTER -->
                    <div class="card-footer">

                        <form id="messageArea" class="input-group">

                            <input type="text"
                                id="text"
                                name="msg"
                                placeholder="Posez votre question..."
                                autocomplete="off"
                                class="form-control type_msg"
                                required>

                            <div class="input-group-append">

                                <button type="submit"
                                    id="send"
                                    class="input-group-text send_btn">

                                    <i class="fas fa-paper-plane"></i>

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>
    </div>

    <script>

        $(document).ready(function () {

            $("#messageArea").on("submit", function (event) {

                const date = new Date();
                const hour = date.getHours();
                const minute = date.getMinutes();

                const str_time = `${hour}:${minute}`;

                var rawText = $("#text").val();

                var userHtml = `

                <div class="d-flex justify-content-end mb-4">

                    <div class="msg_cotainer_send">
                        ${rawText}
                        <span class="msg_time_send">${str_time}</span>
                    </div>

                </div>`;

                $("#text").val("");

                $("#messageFormeight").append(userHtml);

                $.ajax({

                    data: {
                        msg: rawText,
                    },

                    type: "POST",

                    url: "/get",

                }).done(function (data) {

                    var botHtml = `

                    <div class="d-flex justify-content-start mb-4">

                        <div class="msg_cotainer">

                            <div class="bot-message-header">
                                <i class="fas fa-robot"></i>
                                Assistant
                            </div>

                            ${data}

                            <span class="msg_time">
                                ${str_time}
                            </span>

                        </div>

                    </div>`;

                    $("#messageFormeight").append($.parseHTML(botHtml));

                    $("#messageFormeight").scrollTop(
                        $("#messageFormeight")[0].scrollHeight
                    );

                });

                event.preventDefault();

            });

        });

    </script>

</body>

</html>
